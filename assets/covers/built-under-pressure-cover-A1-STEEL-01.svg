<?xml version="1.0" encoding="UTF-8"?>
<!--
  BUILT UNDER PRESSURE — Cover Art
  Concept ID: A1-STEEL-01
  Route A — The Span / Steel family / Canonical baseline
  Governed by: BUILT_UNDER_PRESSURE__COVER_BRIEF__v1.md (File 7)
  Format: eBook cover, 1600 × 2560 px, aspect ratio 1:1.6
  Status: Concept — type zones reserved, beam geometry spec, awaiting review rubric pass
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 2560"
     width="1600" height="2560">

  <defs>

    <!-- ============================================================
         FILTERS
         ============================================================ -->

    <!--
      Steel grain: horizontal turbulence (low x-freq, high y-freq)
      simulates the directional grain of cold-worked steel plate.
      Multiplied over the gradient fill to introduce material unevenness.
    -->
    <filter id="steelGrain" x="-2%" y="-2%" width="104%" height="104%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.035 0.38"
                    numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0.08" in="noise" result="tinted"/>
      <feComponentTransfer in="tinted" result="adjusted">
        <feFuncR type="linear" slope="0.16" intercept="0.84"/>
        <feFuncG type="linear" slope="0.15" intercept="0.85"/>
        <feFuncB type="linear" slope="0.14" intercept="0.86"/>
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="adjusted" mode="multiply"/>
    </filter>

    <!--
      Background oxidised iron: fine isotropic noise at very low opacity
      gives the dark ground material depth without a gradient wash.
    -->
    <filter id="ironTexture" x="0%" y="0%" width="100%" height="100%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.55" numOctaves="5" seed="13" result="noise"/>
      <feColorMatrix type="saturate" values="0.15" in="noise" result="tinted"/>
      <feComponentTransfer in="tinted" result="faint">
        <feFuncA type="linear" slope="0.065"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faint" mode="screen"/>
    </filter>

    <!-- ============================================================
         GRADIENTS — STEEL BEAM
         Light source: single, upper-left, low angle.
         Top flange receives direct light (brightest).
         Web is in partial shadow (medium-dark).
         Bottom flange is in shadow of the top flange (darker, cooler).
         ============================================================ -->

    <!-- Top flange face: left bright, right falling off -->
    <linearGradient id="topFlangeGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#c4ccd6"/>
      <stop offset="30%"  stop-color="#adb7c2"/>
      <stop offset="70%"  stop-color="#8c9499"/>
      <stop offset="100%" stop-color="#686e74"/>
    </linearGradient>

    <!-- Top flange rim highlight: the very top lit edge -->
    <linearGradient id="topRimHL" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#dce6f0" stop-opacity="1.0"/>
      <stop offset="55%"  stop-color="#c4d0dc" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#7a8690" stop-opacity="0.45"/>
    </linearGradient>

    <!-- Web face: side-lit, cooler, darker centre -->
    <linearGradient id="webGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#5e6870"/>
      <stop offset="40%"  stop-color="#4e5860"/>
      <stop offset="100%" stop-color="#343c44"/>
    </linearGradient>

    <!-- Bottom flange face: shadow from top flange overhang -->
    <linearGradient id="bottomFlangeGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#808890"/>
      <stop offset="35%"  stop-color="#6c747c"/>
      <stop offset="100%" stop-color="#444c52"/>
    </linearGradient>

    <!-- Bottom soffit shadow rim: underside of beam, deepest dark -->
    <linearGradient id="soffitGrad" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#222a30" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#181e24" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Flange-web shadow cast (top flange overhang casts shadow onto web top) -->
    <linearGradient id="webTopShadow" x1="0" y1="0" x2="0" y2="1"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1e2830" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e2830" stop-opacity="0.00"/>
    </linearGradient>

    <!-- Patina mask gradient (darkens web slightly in centre where load concentrates) -->
    <radialGradient id="loadPatinaWeb" cx="50%" cy="50%" r="50%"
                    gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#20282e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#20282e" stop-opacity="0.00"/>
    </radialGradient>

  </defs>


  <!-- ==============================================================
       BACKGROUND
       Warm near-black: oxidised iron, deep ink.
       No gradient wash — a single base fill plus filter texture only.
       ============================================================== -->

  <rect width="1600" height="2560" fill="#1b1714"/>
  <!-- Iron texture: fine material depth, no colour -->
  <rect width="1600" height="2560" fill="#1b1714"
        filter="url(#ironTexture)" opacity="0.55"/>


  <!-- ==============================================================
       I-BEAM — A1-STEEL-01

       Geometry:
         All horizontal edges are quadratic bezier curves
         to produce the slight downward bow under load.

         For a bezier Q x1,y1 x2,y2 (starting from M 0,ya),
         the actual midpoint y = 0.25·ya + 0.50·y1 + 0.25·x2_y
         To achieve a 12 px sag at x=800, the control point
         y must be ya + 24.

       Cross-section (top to bottom, all y values before bow):
         Top flange    — y 1090 → 1152  (62 px tall)
         Web           — y 1152 → 1345  (193 px, x 740–860, 120 px wide)
         Bottom flange — y 1345 → 1407  (62 px tall)
         Soffit rim    — y 1407 → 1415  (8 px)

       Beam centre Y (no bow): (1090+1415)/2 = 1252 = 48.9% of 2560 ✓

       Bow (all bowed edges): control_y = edge_y + 24
         Sag at centre = 12 px (disciplined, not melodramatic)

       Structural element exits frame left and right without margin:
         flanges run x 0 → 1600.
         Web x 740 → 860 (centred at x=800).
       ============================================================== -->


  <!-- ── TOP FLANGE ── -->

  <!-- Rim highlight (lit edge, top of top flange) -->
  <path d="M 0,1090 Q 800,1114 1600,1090"
        fill="none"
        stroke="url(#topRimHL)"
        stroke-width="3.5"
        opacity="0.92"/>

  <!-- Top flange face -->
  <path d="M 0,1093 Q 800,1117 1600,1093
           L 1600,1152 Q 800,1176 0,1152 Z"
        fill="url(#topFlangeGrad)"
        filter="url(#steelGrain)"/>

  <!-- Subtle surface sheen (upper band of flange face, lit) -->
  <path d="M 0,1093 Q 800,1117 1600,1093
           L 1600,1108 Q 800,1132 0,1108 Z"
        fill="#c8d6e4" opacity="0.12"/>

  <!-- Patina patch: darker area mid-left (uneven oxidation) -->
  <ellipse cx="410" cy="1122" rx="135" ry="19"
           fill="#7a8490" opacity="0.10"/>
  <!-- Patina patch: lighter area near-right (different oxide layer) -->
  <ellipse cx="1220" cy="1122" rx="115" ry="17"
           fill="#b0bac6" opacity="0.07"/>

  <!-- Compression stress lines on top flange face
       (under load, micro-compression visible as faint horizontal marks) -->
  <path d="M 180,1106 Q 800,1130 1420,1106"
        fill="none" stroke="#9aa2a8" stroke-width="0.6" opacity="0.22"/>
  <path d="M 280,1118 Q 800,1142 1320,1118"
        fill="none" stroke="#828a90" stroke-width="0.5" opacity="0.15"/>
  <path d="M 380,1130 Q 800,1154 1220,1130"
        fill="none" stroke="#6a7278" stroke-width="0.4" opacity="0.12"/>


  <!-- ── WELD SEAMS (flange-to-web junction, top) ── -->

  <!-- Full-width seam line at junction -->
  <path d="M 0,1152 Q 800,1176 1600,1152"
        fill="none" stroke="#2c3840" stroke-width="1.8" opacity="0.65"/>
  <!-- Short seam ticks at web edges (localised weld detail) -->
  <path d="M 744,1152 L 744,1158 M 749,1150 L 749,1159 M 754,1152 L 754,1157"
        stroke="#3c4a52" stroke-width="1.2" opacity="0.55"/>
  <path d="M 846,1152 L 846,1158 M 851,1150 L 851,1159 M 856,1152 L 856,1157"
        stroke="#3c4a52" stroke-width="1.2" opacity="0.50"/>


  <!-- ── WEB ── -->

  <!-- Web face -->
  <path d="M 740,1154 Q 800,1160 860,1154
           L 860,1347 Q 800,1353 740,1347 Z"
        fill="url(#webGrad)"/>

  <!-- Shadow cast by top flange overhang onto top of web -->
  <path d="M 740,1154 Q 800,1160 860,1154
           L 860,1210 Q 800,1216 740,1210 Z"
        fill="url(#webTopShadow)"/>

  <!-- Load-concentration patina at web centre (pressure mark) -->
  <ellipse cx="800" cy="1250" rx="58" ry="90"
           fill="url(#loadPatinaWeb)"/>

  <!-- Very faint vertical reflective streak (directional light catching web face) -->
  <path d="M 742,1160 L 742,1340"
        stroke="#7a8490" stroke-width="2.5" opacity="0.09"/>


  <!-- ── WELD SEAMS (web-to-flange junction, bottom) ── -->

  <path d="M 0,1347 Q 800,1371 1600,1347"
        fill="none" stroke="#28323c" stroke-width="1.6" opacity="0.58"/>
  <path d="M 744,1347 L 744,1353 M 749,1345 L 749,1354 M 754,1347 L 754,1352"
        stroke="#384450" stroke-width="1.2" opacity="0.48"/>
  <path d="M 846,1347 L 846,1353 M 851,1345 L 851,1354 M 856,1347 L 856,1352"
        stroke="#384450" stroke-width="1.2" opacity="0.45"/>


  <!-- ── BOTTOM FLANGE ── -->

  <!-- Bottom flange face (in shadow) -->
  <path d="M 0,1349 Q 800,1373 1600,1349
           L 1600,1408 Q 800,1432 0,1408 Z"
        fill="url(#bottomFlangeGrad)"
        filter="url(#steelGrain)"/>

  <!-- Patina patches (bottom flange, fewer lit, more oxidised) -->
  <ellipse cx="280" cy="1378" rx="110" ry="17"
           fill="#505860" opacity="0.10"/>
  <ellipse cx="1310" cy="1378" rx="90" ry="15"
           fill="#606870" opacity="0.08"/>

  <!-- Soffit shadow rim (underside of beam, physically the darkest surface) -->
  <path d="M 0,1410 Q 800,1434 1600,1410
           L 1600,1418 Q 800,1442 0,1418 Z"
        fill="url(#soffitGrad)"/>

  <!-- Deep shadow edge line -->
  <path d="M 0,1418 Q 800,1442 1600,1418"
        fill="none" stroke="#121820" stroke-width="2.5" opacity="0.90"/>


  <!-- ── RIVETS / BOLTS at frame junctions ──
       Left and right edges where beam meets unseen supports.
       Two bolts per side: one at top flange centre, one at bottom flange centre.
       Size and shadow calibrated to read at full size, not at thumbnail.
  -->

  <!-- Left, top flange -->
  <g>
    <circle cx="52" cy="1122" r="11"  fill="#525c66" stroke="#343c44" stroke-width="1.8"/>
    <circle cx="52" cy="1122" r="5.5" fill="#6e7c88"/>
    <circle cx="51" cy="1120" r="2.5" fill="#9ab0c2" opacity="0.65"/>
  </g>

  <!-- Left, bottom flange -->
  <g opacity="0.90">
    <circle cx="52" cy="1378" r="11"  fill="#484e58" stroke="#30363e" stroke-width="1.8"/>
    <circle cx="52" cy="1378" r="5.5" fill="#5e6870"/>
    <circle cx="51" cy="1376" r="2.5" fill="#8090a0" opacity="0.50"/>
  </g>

  <!-- Right, top flange -->
  <g opacity="0.80">
    <circle cx="1548" cy="1122" r="11"  fill="#4c5660" stroke="#323840" stroke-width="1.8"/>
    <circle cx="1548" cy="1122" r="5.5" fill="#626e7a"/>
    <circle cx="1547" cy="1120" r="2.5" fill="#8898a8" opacity="0.48"/>
  </g>

  <!-- Right, bottom flange -->
  <g opacity="0.72">
    <circle cx="1548" cy="1378" r="11"  fill="#424850" stroke="#2c323a" stroke-width="1.8"/>
    <circle cx="1548" cy="1378" r="5.5" fill="#545e68"/>
    <circle cx="1547" cy="1376" r="2.5" fill="#6c7880" opacity="0.38"/>
  </g>


  <!-- ==============================================================
       TYPOGRAPHY

       Typeface: system heavy sans-serif (final production will use
       a governed typeface from File 7 §10 — neo-grotesque, Black weight).
       System fallback chain targets the heaviest available sans on
       each platform without installing fonts in concept stage.

       Title hierarchy:
         "BUILT"    — line 1, y=800  (baseline)
         "UNDER"    — line 2, y=1045 (baseline, 11px above beam top)
         [beam spans y=1090–1418, PRESSURE locks into it]
         "PRESSURE" — line 3, y=1380 (baseline, embedded in web+bottom flange)

       Cap-height estimate (heavy sans at 218 px ≈ 72% ascent = 157 px):
         BUILT top:     y ≈ 800 − 157 = 643
         UNDER top:     y ≈ 1045 − 157 = 888
         PRESSURE top:  y ≈ 1380 − 157 = 1223  → inside web (1154–1345) ✓

       Gap UNDER baseline (1045) → beam top (1090): 45 px
       Gap beam bottom (1418) → subtitle start (1568): 150 px

       The title block occupies y=643 to y=1380 = 737 px = 28.8% of cover.
       Combined with beam: structural+title bloc y=643–1418 = 775 px = 30.3%.

       Author name y=2472 (foot of cover, 88 px from bottom trim).
       ============================================================== -->


  <!-- ── TITLE ── -->

  <!-- BUILT -->
  <text x="800" y="800"
        font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Helvetica Neue', Arial, sans-serif"
        font-size="218"
        font-weight="900"
        fill="#e4ddd5"
        text-anchor="middle"
        letter-spacing="-5">BUILT</text>

  <!-- UNDER -->
  <text x="800" y="1045"
        font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Helvetica Neue', Arial, sans-serif"
        font-size="218"
        font-weight="900"
        fill="#e4ddd5"
        text-anchor="middle"
        letter-spacing="-5">UNDER</text>

  <!--
    PRESSURE — cold near-white (steel-toned, not warm) so the word
    reads as materially continuous with the beam rather than floating over it.
    Baseline at 1380: text occupies y=1223–1413 (caps + descenders)
    which maps directly onto the web (1154–1345) and bottom flange (1345–1418).
  -->
  <text x="800" y="1380"
        font-family="'Arial Black', 'Impact', 'Franklin Gothic Heavy', 'Haettenschweiler', 'Helvetica Neue', Arial, sans-serif"
        font-size="218"
        font-weight="900"
        fill="#d8e0e8"
        text-anchor="middle"
        letter-spacing="-5">PRESSURE</text>


  <!-- ── SUBTITLE ──
       Sentence case per File 7 §10.2.
       Three lines, ~26 chars per line, 62 px leading at 50 px font.
       Colour: warm mid-grey — readable at full size, permitted to fade at thumbnail.
  -->
  <text x="800" y="1568"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="49"
        font-weight="400"
        fill="#7a7570"
        text-anchor="middle"
        letter-spacing="0.5">What I Needed to Understand</text>

  <text x="800" y="1630"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="49"
        font-weight="400"
        fill="#7a7570"
        text-anchor="middle"
        letter-spacing="0.5">Before I Mistook Hard Work</text>

  <text x="800" y="1692"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="49"
        font-weight="400"
        fill="#7a7570"
        text-anchor="middle"
        letter-spacing="0.5">for Business Ownership</text>


  <!-- ── AUTHOR NAME ──
       "C M Raymond" per Metadata Master. Shown in small caps styling
       via letter-spacing on uppercase — no true small-caps requested.
       Foot of cover, centred. Quiet. Third in hierarchy.
       Wide tracking ensures it reads at full size; permitted to disappear at thumbnail.
  -->
  <text x="800" y="2472"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="47"
        font-weight="300"
        fill="#4e4a46"
        text-anchor="middle"
        letter-spacing="9">C M RAYMOND</text>

</svg>
